<figure class="chart-embed" style="margin:0; font-family:var(--font-body);">
<p style="margin:0 0 3px;font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--muted);">Argentina &middot; Deep Dive &middot; 2022&ndash;2026</p>
<p style="margin:0 0 3px;font-size:18px;font-weight:500;color:var(--text);line-height:1.3;">The 2026&ndash;28 External Maturity Wall</p>
<p style="margin:0 0 18px;font-size:12px;color:var(--muted);">USD bn of external amortizations falling due &middot; IMF repurchases plus non-IMF external principal &mdash; the financing need the anchor must roll</p>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;"><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">2026</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">US$8.6bn</div></div><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">2027</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">US$11.9bn</div></div><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">2028</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">US$14.6bn</div></div></div><div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:12px;"><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);"><span data-k="crimson" style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#888;flex-shrink:0;"></span>IMF repurchases</span><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);"><span data-k="amber" style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#888;flex-shrink:0;"></span>External (non-IMF)</span></div><div style="position:relative; width:100%; height:260px;">
<canvas id="arg-fig14" role="img" aria-label="Stacked bar chart of the 2026 to 2028 external maturity wall"></canvas>
</div>
<div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:10px;color:var(--muted);letter-spacing:0.02em;"><span>Source: <a href="https://www.imf.org/en/publications/cr/issues/2026/05/22/argentina-2026-article-iv-consultation-second-review-under-the-extended-arrangement-under-the-extended-fund-facility-576253" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">IMF Country Report 2026/105</a> (Tables 1, 2, 7, 12) &middot; documentary, not pipeline-derived. Author&#8217;s calculations.</span><a href="https://nikkhosravipour.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">nikkhosravipour.com</a></div>
</figure>
<script>
(function () {
  window.__chartjs = window.__chartjs || new Promise(function(resolve) {
    if (window.Chart) return resolve();
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js';
    s.onload = resolve;
    document.head.appendChild(s);
  });
  var canvas = document.getElementById('arg-fig14');
  if (!canvas) return;
  var SPEC = {"type":"bar","stacked":true,"labels":["2026","2027","2028"],"xEvery":1,"datasets":[{"label":"IMF","key":"crimson","data":[1.1,4.4,6.6],"width":0},{"label":"External","key":"amber","data":[7.5,7.5,8],"width":0}]};
  var scope = canvas.closest('figure');
  var chart;
  function palette() {
    var light = document.body.classList.contains('is-light');
    return {
      tick:    light ? 'rgba(0,0,0,0.42)' : 'rgba(255,255,255,0.5)',
      grid:    light ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.07)',
      yTick:   light ? 'rgba(0,0,0,0.65)' : 'rgba(255,255,255,0.7)',
      actual:  light ? '#1C1C1A' : '#E8E6DF',
      blue:    light ? '#185FA5' : '#60a5fa',
      green:   light ? '#1D9E75' : '#34d399',
      amber:   light ? '#BA7517' : '#f59e0b',
      red:     light ? '#D85A30' : '#f87171',
      purple:  light ? '#534AB7' : '#a78bfa',
      crimson: light ? '#A32D2D' : '#ef4444',
      gray:    light ? '#8a8a86' : '#9ca3af',
      band:    light ? 'rgba(185,210,235,0.35)' : 'rgba(96,165,250,0.12)',
      hband:   light ? 'rgba(29,158,117,0.15)'  : 'rgba(52,211,153,0.12)',
      muted:   light ? 'rgba(0,0,0,0.50)' : 'rgba(255,255,255,0.55)'
    };
  }
  function alpha(hex, a) {
    var n = parseInt(hex.slice(1), 16);
    return 'rgba(' + (n >> 16) + ',' + ((n >> 8) & 255) + ',' + (n & 255) +
           ',' + a + ')';
  }
  function render() {
    if (!window.Chart) return;
    var c = palette();
    scope.querySelectorAll('[data-k]').forEach(function(sw) {
      sw.style.background = c[sw.dataset.k] || '#888';
    });
    var deco = {
      id: 'deco',
      beforeDraw: function(ch) {
        var ctx = ch.ctx, ca = ch.chartArea, xs = ch.scales.x, ys = ch.scales.y;
        (SPEC.bands || []).forEach(function(b) {
          var x0 = xs.getPixelForValue(b.from), x1 = xs.getPixelForValue(b.to);
          ctx.save(); ctx.fillStyle = c.band;
          ctx.fillRect(x0, ca.top, x1 - x0, ca.bottom - ca.top); ctx.restore();
        });
        if (SPEC.hband) {
          var y0 = ys.getPixelForValue(SPEC.hband.lo);
          var y1 = ys.getPixelForValue(SPEC.hband.hi);
          ctx.save(); ctx.fillStyle = c.hband;
          ctx.fillRect(ca.left, y1, ca.right - ca.left, y0 - y1);
          if (SPEC.hband.label) {
            ctx.fillStyle = c.muted; ctx.font = '9px system-ui, sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(SPEC.hband.label, ca.right - 4, y1 - 4);
          }
          ctx.restore();
        }
      },
      afterDraw: function(ch) {
        var ctx = ch.ctx, ca = ch.chartArea, xs = ch.scales.x;
        (SPEC.vlines || []).forEach(function(v) {
          var px = xs.getPixelForValue(v.x);
          ctx.save();
          ctx.strokeStyle = c.muted; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
          ctx.beginPath(); ctx.moveTo(px, ca.top); ctx.lineTo(px, ca.bottom);
          ctx.stroke(); ctx.setLineDash([]);
          if (v.text) {
            ctx.fillStyle = c.muted; ctx.font = '9px system-ui, sans-serif';
            ctx.translate(px - 3, ca.top + 4); ctx.rotate(Math.PI / 2);
            ctx.textAlign = 'left';
            ctx.fillText(v.text, 0, 0);
          }
          ctx.restore();
        });
        if (SPEC.hline !== undefined && SPEC.hline !== null) {
          var ys = ch.scales.y, y0 = ys.getPixelForValue(SPEC.hline);
          ctx.save(); ctx.strokeStyle = c.tick; ctx.setLineDash([4, 4]);
          ctx.beginPath(); ctx.moveTo(ca.left, y0); ctx.lineTo(ca.right, y0);
          ctx.stroke(); ctx.restore();
        }
      }
    };
    var datasets = SPEC.datasets.map(function(d) {
      var col = c[d.key] || c.actual;
      return {
        label: d.label,
        data: d.data,
        borderColor: col,
        backgroundColor: d.fillAlpha ? alpha(col, d.fillAlpha) : col,
        borderWidth: d.width !== undefined ? d.width : 2,
        borderDash: d.dash ? [5, 4] : undefined,
        pointRadius: 0,
        spanGaps: true,
        tension: 0.15,
        fill: d.fillTo !== undefined ? d.fillTo : false,
        stack: SPEC.stacked ? 'stack0' : undefined,
        yAxisID: d.y2 ? 'y1' : 'y',
        type: d.type || undefined
      };
    });
    var scales = {
      x: {
        stacked: !!SPEC.stacked,
        border: { display: false },
        grid: { color: c.grid },
        ticks: { color: c.tick, font: { size: 10, family: 'system-ui, sans-serif' },
          maxRotation: 0, autoSkip: false,
          callback: function(val, i) {
            return i % (SPEC.xEvery || 1) === 0 ? SPEC.labels[i] : null;
          } }
      },
      y: {
        stacked: !!SPEC.stacked,
        border: { display: false },
        grid: { color: c.grid },
        ticks: { color: c.yTick, font: { size: 10, family: 'system-ui, sans-serif' },
          callback: function(v) { return v + (SPEC.ySuffix || ''); } }
      }
    };
    if (SPEC.y1) {
      scales.y1 = {
        position: 'right', border: { display: false },
        grid: { drawOnChartArea: false },
        ticks: { color: c.yTick, font: { size: 10, family: 'system-ui, sans-serif' },
          callback: function(v) { return v + (SPEC.y1Suffix || ''); } }
      };
    }
    if (chart) chart.destroy();
    chart = new Chart(canvas, {
      type: SPEC.type,
      plugins: [deco],
      data: { labels: SPEC.labels, datasets: datasets },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        layout: { padding: { top: 18, right: 16, left: 0, bottom: 4 } },
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: false }, title: { display: false } },
        scales: scales
      }
    });
  }
  window.__chartjs.then(function() {
    render();
    new MutationObserver(render).observe(document.body,
      { attributes: true, attributeFilter: ['class'] });
  });
})();
</script>
